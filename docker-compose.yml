services:
  # ---------------------------------------------------------------------------
  # CCI / AVCS — Infra completa (Step 3)
  # ---------------------------------------------------------------------------

  # --- Infrastructure --------------------------------------------------------

  mongodb:
    image: mongo:7.0
    command: ["--replSet", "rs0", "--keyFile", "/etc/mongodb/pki/keyfile", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
    volumes:
      - mongodb_data:/data/db
      - ./infra/docker/init-scripts:/docker-entrypoint-initdb.d:ro
      - ./infra/docker/mongodb-keyfile:/etc/mongodb/pki/keyfile:ro
    ports:
      - "27017:27017"
    networks:
      - cci-backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - cci-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/db/neo4j/cluster/available || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - cci-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cci-backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cci-backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- CCI Services -----------------------------------------------------------

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
      CCI_INGESTION_PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - cci-backend
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docs/ontologies:/app/ontologies:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
      CCI_RETRIEVAL_PORT: 8002
      CCI_EMBEDDING_MODEL: ${CCI_EMBEDDING_MODEL:-all-mpnet-base-v2}
      CCI_RERANKER_MODEL: ${CCI_RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      CCI_RERANKER_ENABLED: ${CCI_RERANKER_ENABLED:-true}
    ports:
      - "8002:8002"
    networks:
      - cci-backend
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - retrieval_model_cache:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  knowledge:
    build:
      context: .
      dockerfile: services/knowledge/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MONGODB_URI: mongodb://cci_app:${MONGODB_APP_PASSWORD:-apppassword}@mongodb:27017/cci_operational?authSource=cci_operational
      REDIS_URL: redis://redis:6379/0
      ONTOLOGIES_PATH: /app/ontologies
      CCI_KNOWLEDGE_PORT: 8001
    ports:
      - "8001:8001"
    networks:
      - cci-backend
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./docs/ontologies:/app/ontologies:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  coherence:
    build:
      context: .
      dockerfile: services/coherence/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      NEO4J_DATABASE: neo4j
      CCI_NEO4J_ENABLED: ${CCI_NEO4J_ENABLED:-true}
      ONTOLOGIES_PATH: /app/ontologies
      CCI_COHERENCE_PORT: 8003
    ports:
      - "8003:8003"
    networks:
      - cci-backend
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./docs/ontologies:/app/ontologies:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --- Observability ----------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cci-observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - cci-observability
    depends_on:
      - prometheus
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/docker/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - cci-observability
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  mongodb_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  retrieval_model_cache:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  cci-backend:
    driver: bridge
  cci-observability:
    driver: bridge
  cci-frontend:
    driver: bridge
