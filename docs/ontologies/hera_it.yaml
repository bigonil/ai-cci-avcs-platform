domain: hera_it
version: 1.1.0
description: "Ontologia verticale Hera Group — IT Cloud Multi-Provider & Compliance (Azure primary, AWS secondary, GCP tertiary)"

entities:
  - name: CloudCommitment
    description: "Commitment contrattuale con un singolo cloud provider (Azure EA, AWS EDP, GCP CUD)"
    properties:
      - name: provider
        type: string
        required: true
        allowed_values: ["Azure", "AWS", "GCP"]
        description: "Provider cloud — Azure (primario Hera), AWS (secondario), GCP (terziario/analytics)"
      - name: contract_type
        type: string
        required: false
        description: "Azure EA | AWS EDP | GCP CUD | MACC"
      - name: amount_eur
        type: float
        required: true
        description: "Commitment annuale totale in EUR"
      - name: period_start
        type: date
        required: true
      - name: period_end
        type: date
        required: true
      - name: contract_ref
        type: string
        required: false
      - name: monthly_avg_eur
        type: float
        required: false

  - name: CloudBudgetAllocation
    description: "Budget CdA allocato per provider cloud per anno. Somma delle allocazioni = BudgetApproval totale."
    properties:
      - name: provider
        type: string
        required: true
        allowed_values: ["Azure", "AWS", "GCP"]
      - name: year
        type: int
        required: true
      - name: allocated_eur
        type: float
        required: true
        description: "Quota del budget CdA destinata a questo provider"
      - name: approved_by
        type: string
        required: true
      - name: approval_date
        type: date
        required: true

  - name: ISO27001Certification
    description: "Certificazione ISO/IEC 27001 valida per l'infrastruttura cloud Hera"
    properties:
      - name: issuer
        type: string
        required: true
      - name: valid_from
        type: date
        required: true
      - name: valid_to
        type: date
        required: true
      - name: scope
        type: string
        required: true
      - name: version
        type: string
        required: false
        description: "Es. ISO/IEC 27001:2022"

  - name: BudgetApproval
    description: "Budget IT cloud totale approvato dal CdA per l'anno (somma di tutte le CloudBudgetAllocation)"
    properties:
      - name: year
        type: int
        required: true
      - name: amount_eur
        type: float
        required: true
        description: "Budget totale multi-cloud approvato"
      - name: approved_by
        type: string
        required: true
      - name: approval_date
        type: date
        required: true
      - name: category
        type: string
        required: true

relations:
  - type: COVERED_BY
    from: CloudCommitment
    to: CloudBudgetAllocation
    temporal: true
    description: "Il commitment di un provider è coperto dalla sua allocation specifica"
    properties:
      - name: coverage_pct
        type: float

  - type: ALLOCATED_FROM
    from: CloudBudgetAllocation
    to: BudgetApproval
    temporal: false
    description: "L'allocation per provider fa parte del budget totale CdA"

  - type: REQUIRES_CERTIFICATION
    from: CloudCommitment
    to: ISO27001Certification
    temporal: true
    description: "Ogni commitment attivo richiede ISO 27001 valida per l'intero periodo"

rules:
  - id: R001
    description: "Il commitment di ogni singolo provider non deve superare il budget allocato per quel provider"
    when: "CloudCommitment.amount_eur > CloudBudgetAllocation.allocated_eur WHERE provider=CloudCommitment.provider AND year=year(CloudCommitment.period_start)"
    severity: HIGH
    domain: financial
    article_ref: "Linee Guida HERA DSI §4.2 — Gestione commitment per provider"
    example: "Azure commitment 580k EUR > allocation Azure 500k EUR"

  - id: R002
    description: "La certificazione ISO 27001 deve essere valida per l'intero periodo di ogni commitment attivo"
    when: "NOT exists(ISO27001Certification WHERE valid_from <= CloudCommitment.period_start AND valid_to >= CloudCommitment.period_end)"
    severity: CRITICAL
    domain: compliance
    article_ref: "ISO/IEC 27001:2022 §6.1 — HERA DSI Policy Sicurezza §8.1"
    example: "ISO 27001 scade 2026-03-31 ma Azure commitment copre 2026-01-01/2026-12-31"

  - id: R003
    description: "Il totale multi-cloud (Azure + AWS + GCP) non deve superare il budget CdA totale approvato"
    when: "sum(CloudCommitment.amount_eur WHERE year=year(period_start)) > BudgetApproval.amount_eur WHERE year=year(period_start)"
    severity: HIGH
    domain: financial
    article_ref: "Linee Guida HERA DSI §4.1 — Budget IT approvazione CdA"
    example: "Azure 580k + AWS 190k + GCP 85k = 855k > budget CdA 800k"

  - id: R004
    description: "Nessun singolo provider deve superare il 70% del budget cloud totale (rischio concentrazione)"
    when: "CloudCommitment.amount_eur / sum(ALL_CloudCommitment.amount_eur) > 0.70"
    severity: MEDIUM
    domain: financial
    article_ref: "HERA DSI Multi-Cloud Strategy §2.3 — Vendor lock-in mitigation"
    example: "Azure 580k / 855k totale = 67.8% — sotto soglia, ma da monitorare"
