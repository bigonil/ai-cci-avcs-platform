global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cci-ingestion"
    static_configs:
      - targets: ["ingestion:8000"]
    metrics_path: /metrics

  - job_name: "cci-knowledge"
    static_configs:
      - targets: ["knowledge:8001"]
    metrics_path: /metrics

  - job_name: "cci-retrieval"
    static_configs:
      - targets: ["retrieval:8002"]
    metrics_path: /metrics

  - job_name: "cci-coherence"
    static_configs:
      - targets: ["coherence:8003"]
    metrics_path: /metrics

  - job_name: "cci-agents"
    static_configs:
      - targets: ["agents:8004"]
    metrics_path: /metrics

  - job_name: "cci-governance"
    static_configs:
      - targets: ["governance:8005"]
    metrics_path: /metrics

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  - job_name: "mongodb"
    static_configs:
      - targets: ["mongodb-exporter:9216"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    metrics_path: /metrics
