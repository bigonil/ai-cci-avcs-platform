# Root workspace dev dependencies — installed by `uv sync` for all services
[dependency-groups]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "coverage>=7.5",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.uv.workspace]
members = [
    "libs/cci-common",
    "libs/cci-llm",
    "services/ingestion",
    "services/knowledge",
    "services/retrieval",
    "services/coherence",
    "services/agents",
    "services/governance",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "B",        # flake8-bugbear
    "C4",       # flake8-comprehensions
    "UP",       # pyupgrade
    "SIM",      # flake8-simplify
    "TCH",      # flake8-type-checking
    "RUF",      # ruff-specific
]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["cci_common", "cci_llm"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
no_implicit_reexport = true
disallow_any_generics = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
warn_redundant_casts = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "libs/cci-common/tests",
    "libs/cci-llm/tests",
    "services/ingestion/tests",
    "services/knowledge/tests",
    "services/retrieval/tests",
    "services/coherence/tests",
    "services/agents/tests",
    "services/governance/tests",
]
pythonpath = [
    "libs/cci-common/src",
    "libs/cci-llm/src",
    "services/ingestion/src",
    "services/knowledge/src",
    "services/retrieval/src",
    "services/coherence/src",
    "services/agents/src",
    "services/governance/src",
]
markers = [
    "live_llm: tests that call the real Anthropic API (deselect with -m 'not live_llm')",
    "integration: tests requiring real Docker containers via testcontainers",
]
addopts = "-v --tb=short --import-mode=importlib"

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/conftest.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
